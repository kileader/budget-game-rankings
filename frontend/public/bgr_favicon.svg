<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Budget Game Rankings favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10131A"/>
      <stop offset="100%" stop-color="#0B0D12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B5DE5"/>
      <stop offset="100%" stop-color="#D6A5FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- badge tile -->
  <rect x="18" y="18" width="220" height="220" rx="52" fill="url(#bg)"/>
  <rect x="18" y="18" width="220" height="220" rx="52" fill="none" stroke="#2A2236" stroke-width="3"/>
  <rect x="28" y="28" width="200" height="200" rx="42" fill="none" stroke="#1C1725" stroke-width="2"/>

  <!-- emblem -->
  <g filter="url(#shadow)">
    <rect x="70" y="132" width="24" height="50" rx="8" fill="url(#accent)"/>
    <rect x="116" y="106" width="24" height="76" rx="8" fill="url(#accent)"/>
    <rect x="162" y="80" width="24" height="102" rx="8" fill="url(#accent)"/>

    <!-- rank slash -->
    <path d="M58 172 L80 172 L196 92 L196 118 L214 118 L214 62 L158 62 L158 80 L184 80 Z" fill="url(#accent)"/>
  </g>
</svg>